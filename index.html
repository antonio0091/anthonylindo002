<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site de Filmes - Abas Vazias</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #141414;
    color: #fff;
}

header {
    background-color: #1f1f1f;
    padding: 20px;
    text-align: center;
}

header h1 {
    font-size: 2em;
    margin-bottom: 5px;
}

header p {
    font-size: 1em;
    color: #bbb;
}

/* Abas */
.tabs {
    display: flex;
    justify-content: center;
    background-color: #222;
}

.tab {
    padding: 15px 25px;
    cursor: pointer;
    transition: background 0.3s;
    color: #bbb;
}

.tab.active {
    background-color: #4caf50;
    color: #fff;
}

/* Conteúdo das abas */
.tab-content {
    display: none;
    padding: 20px;
}

.tab-content.active {
    display: block;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    position: relative;
    width: 80%;
    max-width: 800px;
}

.modal video {
    width: 100%;
    border-radius: 10px;
}

.close-modal {
    position: absolute;
    top: -20px;
    right: -20px;
    background: #ff0000;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    text-align: center;
    line-height: 40px;
    font-weight: bold;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 10px;
    background-color: #1f1f1f;
    color: #bbb;
}
</style>
</head>
<body>

<header>
    <h1>Site de Filmes</h1>
    <p>Navegue pelas abas</p>
</header>

<!-- Abas -->
<div class="tabs">
    <div class="tab active" data-tab="inicio">Início</div>
    <div class="tab" data-tab="add">Adicionar Vídeos</div>
    <div class="tab" data-tab="feedback">Feedback</div>
</div>

<!-- Conteúdo das abas (vazio) -->
<div class="tab-content active" id="inicio">
    <!-- Conteúdo removido -->
</div>

<div class="tab-content" id="add">
    <!-- Conteúdo removido -->
</div>

<div class="tab-content" id="feedback">
    <!-- Conteúdo removido -->
</div>

<!-- Modal (mantido, mas vazio) -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <video controls id="modalVideo">
            <source src="" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
    </div>
</div>

<footer>
    © 2026 Meu Nome
</footer>

<script>
// Função para trocar abas
const tabs = document.querySelectorAll('.tab');
const tabContents = document.querySelectorAll('.tab-content');

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        tabContents.forEach(content => content.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// Modal vazio (mantido para futuro uso)
const modal = document.getElementById('modal');
const modalVideo = document.getElementById('modalVideo');
const closeModal = document.getElementById('closeModal');

closeModal.addEventListener('click', () => {
    modalVideo.pause();
    modalVideo.src = "";
    modal.style.display = 'none';
});

modal.addEventListener('click', e => {
    if(e.target === modal){
        modalVideo.pause();
        modalVideo.src = "";
        modal.style.display = 'none';
    }
});
</script>

</body>
</html>

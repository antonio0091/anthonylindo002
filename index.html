<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paraná Filmes</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #141414;
    color: #fff;
    padding-top: 10px;
}

header {
    background-color: #1f1f1f;
    padding: 30px 20px;
    text-align: center;
}

header h1 {
    font-size: 2em;
    margin-bottom: 5px;
    color: #ff1a1a;
    text-shadow: 0 0 10px #ff1a1a, 0 0 20px #ff0000;
}

header p {
    font-size: 1em;
    color: #bbb;
}

/* Abas */
.tabs {
    display: flex;
    justify-content: center;
    background-color: #222;
    padding: 10px 0;
    gap: 10px;
}

.tab {
    padding: 12px 25px;
    cursor: pointer;
    color: #bbb;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
}

/* Borda neon animada */
.tab::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 8px;
    padding: 2px;
    background: linear-gradient(120deg, transparent, #ff1a1a, transparent);
    background-size: 200% 200%;
    -webkit-mask: 
        linear-gradient(#000 0 0) content-box, 
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: neonMove 3s linear infinite;
}

@keyframes neonMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.tab:hover {
    color: #fff;
    box-shadow: 0 0 10px #ff1a1a;
}

/* Aba ativa */
.tab.active {
    color: #fff;
    transform: scale(1.08);
}

.tab.active::before {
    background: linear-gradient(120deg, #ff1a1a, #ff0000, #ff1a1a);
    box-shadow: 0 0 15px #ff1a1a, 0 0 25px #ff1a1a;
}

/* Conteúdo das abas */
.tab-content {
    display: none;
    padding: 40px 20px;
    margin-top: 10px;
}

.tab-content.active {
    display: block;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    position: relative;
    width: 80%;
    max-width: 800px;
}

.modal video {
    width: 100%;
    border-radius: 10px;
}

.close-modal {
    position: absolute;
    top: -20px;
    right: -20px;
    background: #ff1a1a;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    text-align: center;
    line-height: 40px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px #ff1a1a;
}

/* Footer */
footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    background: transparent;
    color: rgba(255, 255, 255, 0.2); /* mais transparente */
    font-size: 0.9em;
    z-index: 1000;
    pointer-events: none;
}
</style>
</head>
<body>

<header>
    <h1>Paraná Filmes</h1>
    <p>Navegue pelas abas</p>
</header>

<div class="tabs">
    <div class="tab active" data-tab="inicio">Início</div>
    <div class="tab" data-tab="add">Adicionar Vídeos</div>
    <div class="tab" data-tab="feedback">Feedback</div>
</div>

<div class="tab-content active" id="inicio">
    <p>Bem-vindo ao Paraná Filmes! Aqui você verá os lançamentos e clássicos favoritos.</p>
</div>

<div class="tab-content" id="add">
    <p>Aqui você poderá adicionar seus vídeos favoritos futuramente.</p>
</div>

<div class="tab-content" id="feedback">
    <p>Deixe seu feedback sobre o site aqui.</p>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <video controls id="modalVideo">
            <source src="" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
    </div>
</div>

<footer>
    @ anthony_martims
</footer>

<script>
const tabs = document.querySelectorAll('.tab');
const tabContents = document.querySelectorAll('.tab-content');

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        tabContents.forEach(content => content.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

const modal = document.getElementById('modal');
const modalVideo = document.getElementById('modalVideo');
const closeModal = document.getElementById('closeModal');

closeModal.addEventListener('click', () => {
    modalVideo.pause();
    modalVideo.src = "";
    modal.style.display = 'none';
});

modal.addEventListener('click', e => {
    if(e.target === modal){
        modalVideo.pause();
        modalVideo.src = "";
        modal.style.display = 'none';
    }
});
</script>

</body>
</html>
